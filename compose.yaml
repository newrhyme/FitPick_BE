services:
  mysql:
    image: mysql:8.0
    container_name: fitpick-mysql
    profiles: ["local-mysql"]
    environment:
      MYSQL_DATABASE: '${MYSQL_DATABASE:-fitpick}'
      MYSQL_USER: '${MYSQL_USER:-fitpick}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-000624}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-000624}'
      TZ: Asia/Seoul
    ports:
      - '${MYSQL_HOST_PORT:-3306}:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data: