spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fitpick}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  docker:
    compose:
      enabled: false   # 서버에선 Spring이 compose를 건드리지 않게

  jpa:
    show-sql: false                 # 운영 로그 노이즈 제거
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: ${JWT_SECRET}             # fallback 없음 → 누락 시 부팅 실패(의도된 동작)

app:
  profile-name: prod