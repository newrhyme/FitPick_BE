spring:
  application:
    name: fitpick

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100

jwt:
  secret: ${JWT_SECRET:fitpick-dev-only-secret-key-change-this-in-production-min32ch}
  access-token-expiration-ms: 86400000   # 24시간

app:
  profile-name: default
  s3:
    bucket: fitpick-images
    region: ap-northeast-2
    public-base-url: https://fitpick-images.s3.ap-northeast-2.amazonaws.com
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com
    image-model: gpt-image-1
    image-size: 1024x1536
    image-quality: medium
    timeout-sec: 60
